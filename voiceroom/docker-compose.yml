# VoiceRoom — Docker Compose
# Uso: a partir da raiz do monorepo (voiceroom/)
#   docker compose -f voiceroom/docker-compose.yml up -d
# Ou, estando dentro de voiceroom/:  docker compose up -d

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-voiceroom}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-voiceroom_pass}
      POSTGRES_DB: ${POSTGRES_DB:-voiceroom}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-voiceroom}"]
      interval: 5s
      timeout: 5s
      retries: 5

  coturn:
    image: coturn/coturn:latest
    network_mode: host
    command:
      - -n
      - --log-file=stdout
      - --listening-port=3478
      - --tls-listening-port=5349
      - --realm=${COTURN_REALM:-voiceroom.local}
      - --fingerprint
      - --lt-cred-mech
      - --user=${COTURN_AUTH_USER:-voiceroom}:${COTURN_AUTH_PASS:-voiceroom_turn_pass}
      - --no-multicast-peers
    # Em produção use um host com IP público e portas 3478/5349 (UDP/TCP) abertas

  server:
    build:
      context: .
      dockerfile: apps/server/Dockerfile
    env_file: .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-voiceroom}:${POSTGRES_PASSWORD:-voiceroom_pass}@postgres:5432/${POSTGRES_DB:-voiceroom}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
      PORT: 4000
    ports:
      - "4000:4000"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
