<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 — LIBERTY</title>
    <meta name="theme-color" content="#FFD700">
    <link rel="stylesheet" href="/css/main.css">
    <link rel="stylesheet" href="/css/themes.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" crossorigin="anonymous">
    <style>
        .page-404 {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 24px;
            background: var(--primary-black, #0D0B09);
            color: var(--text-primary, #F5F0E8);
        }
        .page-404 .logo-container {
            margin-bottom: var(--spacing-lg, 24px);
        }
        .page-404 .logo-icon {
            width: 80px;
            height: 80px;
            margin: 0 auto var(--spacing-md, 16px);
            font-size: 38px;
            color: var(--primary-black, #0D0B09);
            background: linear-gradient(135deg, var(--primary-yellow, #FFD700) 0%, var(--dark-yellow, #FF9800) 100%);
            border-radius: var(--radius-xl, 16px);
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .page-404 .logo-icon.logo-icon-img {
            background: transparent;
            padding: 0;
        }
        .page-404 .logo-icon.logo-icon-img img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }
        .page-404 .logo-text {
            font-size: 28px;
            font-weight: 800;
            letter-spacing: 4px;
            background: linear-gradient(135deg, var(--primary-yellow, #FFD700) 0%, var(--light-yellow, #FFEB3B) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .page-404 h1 {
            font-size: 1.5rem;
            font-weight: 600;
            margin-bottom: 8px;
        }
        .page-404 p {
            color: var(--text-secondary, #A8A4A0);
            margin-bottom: 24px;
        }
        .page-404 a {
            color: var(--primary-yellow);
            text-decoration: none;
            font-weight: 500;
        }
        .page-404 a:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div class="page-404" role="main">
        <div class="logo-container">
            <div class="logo-icon logo-icon-img" aria-hidden="true">
                <img src="/assets/logo.png" alt="LIBERTY" width="88" height="88">
            </div>
            <span class="logo-text">LIBERTY</span>
        </div>
        <h1>404</h1>
        <p>This page doesn’t exist or was moved.</p>
        <a href="/">Back to LIBERTY</a>
    </div>
</body>
</html>
