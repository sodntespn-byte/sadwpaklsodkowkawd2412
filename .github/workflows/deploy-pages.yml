# Deploy do app estático no GitHub Pages
# Artefato: pasta do frontend estático (public ou liberty/web)
name: Deploy GitHub Pages

on:
  push:
    branches: [main, master]
  workflow_dispatch:

# Permissões no nível do workflow (obrigatórias para deploy-pages)
permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest

    # Permissões explícitas no job (evita "Get Pages site failed")
    permissions:
      contents: read
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact (frontend estático)
        uses: actions/upload-pages-artifact@v3
        with:
          # Pasta do frontend: liberty/web. Se usar public/, altere para path: public
          path: liberty/web

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
